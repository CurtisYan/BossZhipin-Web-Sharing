<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BOSS 职位长图分享</title>
    <style>
      :root {
        color-scheme: light;
        --teal: #12b8b6;
        --ink: #1f2a30;
        --muted: #6a777d;
        --line: #dcebed;
        --soft: #f3fbfb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        width: 300px;
        margin: 0;
        font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
        color: var(--ink);
        background: linear-gradient(180deg, #f7ffff 0%, #ffffff 62%);
      }

      main {
        padding: 18px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 14px;
      }

      .brand-text {
        min-width: 0;
        flex: 1;
      }

      .check-update {
        flex: 0 0 auto;
        border: 0;
        color: #8a969a;
        cursor: pointer;
        background: transparent;
        font: 500 11px/1 "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
      }

      .check-update:hover {
        color: #0d8f8e;
      }

      .check-update:disabled {
        color: #b8c0c3;
        cursor: default;
      }

      .mark {
        display: grid;
        width: 34px;
        height: 34px;
        place-items: center;
        border-radius: 8px;
        color: #fff;
        font-weight: 800;
        background: var(--teal);
        letter-spacing: 0;
      }

      h1 {
        margin: 0;
        font-size: 16px;
        line-height: 1.35;
      }

      p {
        margin: 0 0 16px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.55;
      }

      .debug-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        margin-top: 12px;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
      }

      .setting-block {
        margin-top: 12px;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
      }

      .setting-title {
        display: block;
        margin-bottom: 10px;
        font-size: 14px;
      }

      .mode-group {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .mode-option {
        position: relative;
      }

      .mode-option input {
        position: absolute;
        opacity: 0;
        pointer-events: none;
      }

      .mode-card {
        display: grid;
        min-height: 54px;
        place-items: center;
        padding: 9px 8px;
        border: 1px solid #d8e7e9;
        border-radius: 8px;
        color: var(--muted);
        cursor: pointer;
        background: #f8fbfb;
        font-size: 13px;
        font-weight: 700;
        line-height: 1.3;
        text-align: center;
        transition: border-color 0.18s ease, background 0.18s ease, color 0.18s ease;
      }

      .mode-option input:checked + .mode-card {
        border-color: var(--teal);
        color: #0d8f8e;
        background: var(--soft);
      }

      .workflow-link {
        display: flex;
        align-items: center;
        gap: 10px;
        width: 100%;
        margin-top: 12px;
        padding: 12px;
        border: 1px solid #d8e7e9;
        border-radius: 8px;
        color: var(--ink);
        cursor: pointer;
        background: #fff;
        font: inherit;
        text-align: left;
        transition: border-color 0.18s ease, background 0.18s ease, transform 0.18s ease;
      }

      .workflow-link:hover {
        border-color: var(--teal);
        background: var(--soft);
        transform: translateY(-1px);
      }

      .github-mark {
        display: grid;
        flex: 0 0 auto;
        width: 30px;
        height: 30px;
        place-items: center;
        border-radius: 8px;
        color: #fff;
        background: #24292f;
      }

      .github-mark svg {
        display: block;
      }

      .workflow-text {
        min-width: 0;
      }

      .workflow-text strong {
        display: block;
        font-size: 14px;
        line-height: 1.35;
      }

      .workflow-text span {
        display: block;
        margin-top: 2px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.35;
      }

      .update-card {
        display: flex;
        align-items: center;
        gap: 10px;
        width: 100%;
        margin-top: 12px;
        padding: 12px;
        border: 1px solid #ffd5c8;
        border-radius: 8px;
        color: #7a2a18;
        cursor: pointer;
        background: #fff5f1;
        font: inherit;
        text-align: left;
      }

      .update-card[hidden] {
        display: none;
      }

      .update-badge {
        display: grid;
        flex: 0 0 auto;
        width: 30px;
        height: 30px;
        place-items: center;
        border-radius: 8px;
        color: #fff;
        background: #ff6b4a;
        font-size: 16px;
        font-weight: 800;
      }

      .update-text {
        min-width: 0;
      }

      .update-text strong,
      .update-text span {
        display: block;
      }

      .update-text strong {
        font-size: 14px;
        line-height: 1.35;
      }

      .update-text span {
        margin-top: 2px;
        color: #9a4b38;
        font-size: 12px;
        line-height: 1.35;
      }

      .debug-text {
        min-width: 0;
      }

      .debug-text strong {
        display: block;
        margin-bottom: 3px;
        font-size: 14px;
      }

      .debug-text span {
        display: block;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.45;
      }

      .switch {
        position: relative;
        flex: 0 0 auto;
        width: 46px;
        height: 26px;
      }

      .switch input {
        position: absolute;
        opacity: 0;
        pointer-events: none;
      }

      .track {
        position: absolute;
        inset: 0;
        border-radius: 999px;
        background: #cbd8da;
        transition: background 0.18s ease;
      }

      .track::after {
        content: "";
        position: absolute;
        width: 20px;
        height: 20px;
        left: 3px;
        top: 3px;
        border-radius: 50%;
        background: #fff;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.18);
        transition: transform 0.18s ease;
      }

      .switch input:checked + .track {
        background: var(--teal);
      }

      .switch input:checked + .track::after {
        transform: translateX(20px);
      }

      .status {
        min-height: 20px;
        margin-top: 12px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="brand">
        <div class="mark">B</div>
        <h1 class="brand-text">BOSS 职位长图分享</h1>
        <button class="check-update" id="check-update" type="button">检查更新</button>
      </div>
      <p>网页右下角点“做长图”即可生成并复制图片。</p>
      <section class="setting-block" aria-labelledby="output-mode-title">
        <strong class="setting-title" id="output-mode-title">输出方式</strong>
        <div class="mode-group">
          <label class="mode-option">
            <input type="radio" name="output-mode" value="copy">
            <span class="mode-card">复制到剪贴板</span>
          </label>
          <label class="mode-option">
            <input type="radio" name="output-mode" value="download">
            <span class="mode-card">下载 PNG</span>
          </label>
        </div>
      </section>
      <div class="debug-row">
        <div class="debug-text">
          <strong>调试模式</strong>
          <span>若发现数据不准可开启调试模式。</span>
        </div>
        <label class="switch" aria-label="调试模式">
          <input id="debug-mode" type="checkbox">
          <span class="track"></span>
        </label>
      </div>
      <button class="workflow-link" id="workflow-link" type="button">
        <span class="github-mark" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor">
            <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82A7.65 7.65 0 0 1 8 3.87c.68 0 1.36.09 2 .26 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8Z"></path>
          </svg>
        </span>
        <span class="workflow-text">
          <strong>推荐工作流</strong>
          <span>查看 README 里的完整用法</span>
        </span>
      </button>
      <button class="update-card" id="update-card" type="button" hidden>
        <span class="update-badge" aria-hidden="true">!</span>
        <span class="update-text">
          <strong>发现新版本 <span id="update-version"></span></strong>
          <span>修复重大 Bug，强烈建议更新</span>
        </span>
      </button>
      <div class="status" id="status"></div>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
